<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forum</title>
</head>
<body>
    <h1>Forum</h1>

    {{if .IsLoggedIn}}
        <p>Welcome, {{.Username}}.</p>
        <p>You are logged in.</p>

        <p>
            <a href="/posts/create">Create a post</a>
        </p>

        <form action="/logout" method="POST">
            <button type="submit">Logout</button>
        </form>
    {{else}}
        <p>Welcome, guest.</p>

        <p>
            <a href="/register">Register</a>
            |
            <a href="/login">Login</a>
        </p>
    {{end}}

    <hr>

    <h2>Posts</h2>

    {{if .Posts}}
        {{range .Posts}}
            <article>
                <h3>{{.Title}}</h3>
                <p>{{.Content}}</p>
                <small>
                    Posted by {{.Username}} on {{.CreatedAt}}
                </small>
            </article>
            <hr>
        {{end}}
    {{else}}
        <p>No posts yet.</p>
    {{end}}
</body>
</html>
