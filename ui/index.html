<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forum</title>
</head>
<body>
    <h1>Forum</h1>

    {{if .IsLoggedIn}}
        <p>Welcome, {{.Username}}.</p>
        <p>You are logged in.</p>

        <form action="/logout" method="POST">
            <button type="submit">Logout</button>
        </form>
    {{else}}
        <p>Welcome, guest.</p>

        <p>
            <a href="/register">Register</a>
            |
            <a href="/login">Login</a>
        </p>
    {{end}}
</body>
</html>
